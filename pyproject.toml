# Generated By: Claude Code (Claude Opus 4.6)
[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-dashboard"
version = "0.1.0"
description = "Cross-platform dashboard for monitoring and navigating Claude Code sessions"
license = {text = "Apache-2.0"}
requires-python = ">=3.11"
dependencies = [
    "psutil>=5.9",
    "pystray>=0.19",
    "Pillow>=10.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0",
    "pytest-cov>=7.0",
    "black>=26.1",
    "flake8>=7.3",
    "mypy>=1.11",
]

[project.scripts]
claude-dashboard = "claude_dashboard.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["claude_dashboard*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"

[tool.coverage.run]
source = ["claude_dashboard"]
omit = [
    "claude_dashboard/ui/*",
    "claude_dashboard/tray.py",
    "claude_dashboard/controller.py",
    "claude_dashboard/__main__.py",
    "claude_dashboard/platform/windows.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "claude_dashboard.platform.windows"
ignore_errors = true

[tool.black]
line-length = 100
target-version = ["py311"]
